name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.13"

jobs:
  # ── 1. Unit tests ────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run unit tests
        run: |
          mkdir -p reports
          pytest tests/test_unit.py \
            -v --tb=short \
            --junitxml=reports/unit-results.xml

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: reports/unit-results.xml

  # ── 2. E2E tests ─────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: unit-tests          # only run if unit tests pass

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Install Playwright + Chromium
        run: playwright install chromium --with-deps

      - name: Start Flask app
        run: python app.py &
        env:
          FLASK_ENV: testing

      - name: Wait for Flask to be ready
        run: |
          echo "Waiting for Flask on port 5000…"
          for i in $(seq 1 30); do
            curl -sf http://localhost:5000/ > /dev/null && echo "Flask is up!" && break
            echo "Attempt $i/30 — retrying in 2 s…"
            sleep 2
          done

      - name: Run E2E tests (UI — no live data required)
        run: |
          mkdir -p reports test-results
          pytest tests/test_e2e.py \
            -v --tb=short \
            -m "not slow" \
            --base-url=http://localhost:5000 \
            --junitxml=reports/e2e-results.xml \
            --tracing=retain-on-failure \
            --output=test-results

      - name: Run E2E tests (data-dependent — allowed to fail)
        continue-on-error: true
        run: |
          pytest tests/test_e2e.py \
            -v --tb=short \
            -m slow \
            --base-url=http://localhost:5000 \
            --junitxml=reports/e2e-slow-results.xml \
            --tracing=retain-on-failure \
            --output=test-results

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: reports/

      - name: Upload Playwright traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
