services:
  - type: web
    name: midas
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 60 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: FLASK_ENV
        value: production
    healthCheckPath: /
    autoDeploy: false   # CI pipeline controls deploys via Deploy Hook
